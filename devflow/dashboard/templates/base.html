<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$title · DevFlow Dashboard</title>
<style>
  :root { --fg:#1c2330; --muted:#6b7686; --bg:#f6f7f9; --card:#fff; --line:#e3e7ee;
          --accent:#2d6cdf; --ok:#1c7c43; --danger:#b3261e; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         color:var(--fg); background:var(--bg); }
  header { background:var(--card); border-bottom:1px solid var(--line); padding:10px 20px;
           display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  header .brand { font-weight:700; }
  header nav a { color:var(--accent); text-decoration:none; margin-right:14px; }
  header nav a:hover { text-decoration:underline; }
  header .tag { margin-left:auto; color:var(--muted); font-size:12px; }
  main { max-width:980px; margin:22px auto; padding:0 20px; }
  h1 { font-size:20px; margin:0 0 14px; }
  h3 { margin:0 0 8px; } h4 { margin:14px 0 6px; }
  a { color:var(--accent); }
  table { width:100%; border-collapse:collapse; background:var(--card);
          border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  thead th { background:#eef1f6; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  table.kv th { width:170px; color:var(--muted); font-weight:600; }
  .muted { color:var(--muted); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:8px;
          padding:14px 16px; margin:14px 0; }
  .card.gate { border-color:var(--accent); }
  form.inline { display:inline-block; margin:6px 8px 0 0; }
  label { display:block; margin:10px 0 4px; font-weight:600; }
  input[type=text], textarea, select { width:100%; padding:8px; border:1px solid var(--line);
          border-radius:6px; font:inherit; background:#fff; }
  textarea { min-height:200px; font-family:ui-monospace,Menlo,Consolas,monospace; }
  button { padding:8px 14px; border:1px solid var(--line); border-radius:6px; background:#fff;
           cursor:pointer; font:inherit; }
  button:hover { background:#f0f3f8; }
  button.ok { border-color:var(--ok); color:var(--ok); }
  button.danger { border-color:var(--danger); color:var(--danger); }
  .checkbox { display:flex; align-items:center; gap:8px; margin-top:10px; }
  .checkbox input { width:auto; }
  pre { background:#0f1729; color:#e6edf7; padding:12px; border-radius:8px; overflow:auto;
        white-space:pre-wrap; word-break:break-word; }
  code { background:#eef1f6; padding:1px 5px; border-radius:4px; }
  .alert { padding:9px 12px; border-radius:6px; margin:10px 0; border:1px solid var(--line); }
  .alert.ok { background:#e7f5ec; border-color:#bfe3cc; color:var(--ok); }
  .alert.err { background:#fdecea; border-color:#f3c4c0; color:var(--danger); }
  .alert.info { background:#eaf1fc; border-color:#c6d8f6; color:var(--accent); }
  .marker { font-weight:700; }
  .note { background:#fff8e6; border:1px solid #f0e3b8; border-radius:6px; padding:8px 12px;
          font-size:12px; color:#6a5b1f; }
</style>
</head>
<body>
<header>
  <span class="brand">DevFlow Dashboard</span>
  <nav>
    <a href="/">Runs</a>
    <a href="/new">New run</a>
    <a href="/manual">Manual packet</a>
    <a href="/watcher">Codex watcher</a>
  </nav>
  <span class="tag">local · dry-run / read-only</span>
</header>
<main>
$content
</main>
</body>
</html>
