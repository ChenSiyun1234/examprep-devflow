<h1>Review Queue <span class="muted">$mode_tag</span></h1>
<p class="muted">$intro</p>
$notice
$result
<form method="post" action="/orchestrator" class="card">
  <label for="repo">repo <span class="muted">(required, owner/name)</span></label>
  <input type="text" id="repo" name="repo" placeholder="e.g. ChenSiyun1234/examprep-devflow" required>

  <label for="limit">limit <span class="muted">(open PRs to inspect; default 50)</span></label>
  <input type="text" id="limit" name="limit" value="50">

  <div class="checkbox">
    <input type="checkbox" id="dryrun" checked disabled>
    <label for="dryrun" style="margin:0;font-weight:400;">dry-run planning (always on — computing the
    plan is read-only: it never persists tracking state and never touches GitHub)</label>
  </div>
  <p class="note">$form_note</p>

  <p><button type="submit">Compute plan</button></p>
</form>
